version: "3.8"

services:
  api:
    build: ./api
    container_name: du-tiku-api
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_PATH=/app/data/du-tiku.db
      - JWT_SECRET=${JWT_SECRET:-dujia-tiku-secret}
      - AI_ENDPOINT=${AI_ENDPOINT:-https://api.deepseek.com/v1/chat/completions}
      - AI_API_KEY=${AI_API_KEY}
      - AI_MODEL=${AI_MODEL:-deepseek-chat}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./api/src:/app/src:ro
    networks:
      - du-tiku-net

  nginx:
    image: nginx:alpine
    container_name: du-tiku-nginx
    restart: unless-stopped
    ports:
      - "${HOST_PORT}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./web:/usr/share/nginx/html:ro
    depends_on:
      - api
    networks:
      - du-tiku-net

networks:
  du-tiku-net:
    driver: bridge
